<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Dashboard Data · Inflasi & Nilai Tukar</title>
  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js & PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fc;
      color: #1e293b;
      padding: 20px 16px 32px;
      line-height: 1.5;
    }

    .dashboard {
      max-width: 1440px;
      margin: 0 auto;
    }

    /* Header */
    .app-header {
      margin-bottom: 28px;
    }
    .app-header h1 {
      font-weight: 700;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .app-header h1 i {
      color: #2563eb;
      background: rgba(37, 99, 235, 0.12);
      padding: 10px;
      border-radius: 18px;
      font-size: 1.8rem;
    }
    .last-updated {
      font-size: 0.9rem;
      color: #64748b;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 36px;
    }
    .info-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 24px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 4px 8px rgba(0,0,0,0.03);
      border: 1px solid #eef2f6;
      transition: transform 0.2s ease, box-shadow 0.2s;
    }
    .info-card:hover {
      box-shadow: 0 20px 30px -8px rgba(0,35,70,0.08);
      transform: translateY(-2px);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .wilayah-badge {
      font-weight: 700;
      font-size: 1.3rem;
      color: #0f172a;
    }
    .wilayah-badge i {
      margin-right: 8px;
      color: #2563eb;
    }
    .periode {
      background: #f1f5f9;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #334155;
    }
    .stats-row {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px dashed #e2e8f0;
      padding-bottom: 8px;
    }
    .stat-label {
      font-weight: 500;
      color: #475569;
      font-size: 1rem;
    }
    .stat-value {
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: -0.01em;
    }
    .trend-up { color: #10b981; }
    .trend-down { color: #ef4444; }
    .trend-icon { margin-left: 6px; font-size: 1rem; }

    /* Filter bar */
    .filter-section {
      background: white;
      border-radius: 24px;
      padding: 20px 24px;
      margin-bottom: 28px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      border: 1px solid #eef2f6;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px 30px;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .filter-group label {
      font-weight: 600;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-select {
      padding: 10px 18px;
      border-radius: 40px;
      border: 1.5px solid #e2e8f0;
      background: white;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #0f172a;
      outline: none;
      cursor: pointer;
      transition: border 0.2s;
    }
    .filter-select:hover {
      border-color: #94a3b8;
    }
    .filter-select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    /* Chart containers */
    .chart-card {
      background: white;
      border-radius: 28px;
      padding: 20px 20px 16px;
      margin-bottom: 32px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.02);
      border: 1px solid #eef2f6;
    }
    .chart-title {
      font-weight: 700;
      font-size: 1.4rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chart-wrapper {
      position: relative;
      height: 360px;
      width: 100%;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* exchange section */
    .exchange-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .live-rate {
      background: #f8fafc;
      border-radius: 60px;
      padding: 6px 18px;
      font-weight: 600;
      border: 1px solid #dbeafe;
      color: #1e40af;
    }

    .footer-note {
      text-align: right;
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 16px;
      border-top: 1px solid #e2e8f0;
      padding-top: 16px;
    }

    /* Responsive */
    @media (max-width: 800px) {
      .cards-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .app-header h1 {
        font-size: 1.9rem;
      }
      .filter-section {
        flex-direction: column;
        align-items: flex-start;
      }
    }
    @media (max-width: 480px) {
      body { padding: 16px 12px; }
      .stat-value { font-size: 1.4rem; }
      .chart-wrapper { height: 280px; }
    }

    .loading-placeholder {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }
    .error-message {
      background: #fee2e2;
      color: #b91c1c;
      padding: 12px 20px;
      border-radius: 20px;
    }
    i { margin-right: 4px; }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="app-header">
    <h1>
      <i class="fas fa-chart-pie"></i> 
      Dashboard Data
    </h1>
    <div class="last-updated" id="updateTimestamp">
      <i class="far fa-calendar-alt"></i> 
      <span>Memuat data terbaru...</span>
    </div>
  </div>

  <!-- 3 Kartu Inflasi Terkini (mtm, ytd, yoy) -->
  <div class="cards-grid" id="cardsContainer">
    <!-- akan diisi dinamis oleh js -->
    <div class="info-card">
      <div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i> Memuat kartu...</div>
    </div>
  </div>

  <!-- Filter Grafik -->
  <div class="filter-section">
    <div class="filter-group">
      <label><i class="fas fa-chart-line"></i> Metrik</label>
      <select id="metricSelect" class="filter-select">
        <option value="inflasi_yoy" selected>📆 YoY (Tahun ke Tahun)</option>
        <option value="inflasi_mtm">📅 MtM (Bulan ke Bulan)</option>
        <option value="inflasi_ytd">📊 YtD (Tahun Kalender)</option>
      </select>
    </div>
    <div class="filter-group">
      <label><i class="far fa-calendar-check"></i> Tahun</label>
      <select id="yearSelect" class="filter-select">
        <option value="all">Semua Tahun (2024-2026)</option>
        <option value="2024">2024</option>
        <option value="2025" selected>2025</option>
        <option value="2026">2026</option>
      </select>
    </div>
    <div style="margin-left: auto; font-size:0.9rem; color:#475569;">
      <i class="fas fa-map-pin"></i> Nasional · Jateng · Tegal
    </div>
  </div>

  <!-- Grafik Perbandingan Inflasi -->
  <div class="chart-card">
    <div class="chart-title">
      <i class="fas fa-chart-bar" style="color:#2563eb;"></i> 
      Perbandingan Inflasi Nasional, Jawa Tengah, Kota Tegal
    </div>
    <div class="chart-wrapper">
      <canvas id="inflationChart"></canvas>
    </div>
  </div>

  <!-- Infografis Perbandingan Dolar & Rupiah (Nilai Tukar) -->
  <div class="chart-card">
    <div class="chart-title exchange-header">
      <span><i class="fas fa-dollar-sign" style="color:#16a34a;"></i> Perbandingan USD/IDR (Nilai Tukar)</span>
      <span class="live-rate" id="liveRateBadge"><i class="fas fa-sync-alt fa-spin"></i> memuat...</span>
    </div>
    <div class="chart-wrapper">
      <canvas id="exchangeChart"></canvas>
    </div>
    <div style="font-size:0.85rem; margin-top:12px; color:#64748b;">
      <i class="far fa-clock"></i> Data 30 hari terakhir · Sumber: frankfurter.app
    </div>
  </div>

  <div class="footer-note">
    <i class="far fa-file-csv"></i> Sumber data: inflasi_data.csv · Dashboard real-time
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- GLOBAL VARIABLES ----------
    let rawData = [];                // array hasil parsing CSV
    let inflationChartInstance = null;
    let exchangeChartInstance = null;
    
    const metricSelect = document.getElementById('metricSelect');
    const yearSelect = document.getElementById('yearSelect');
    const cardsContainer = document.getElementById('cardsContainer');
    const updateSpan = document.querySelector('#updateTimestamp span');

    // Chart colors
    const colors = {
      nasional: '#2563eb',
      jateng: '#e11d48',
      tegal: '#10b981'
    };

    // ---------- HELPER: parse CSV & prepare ----------
    async function loadCSV() {
      try {
        const response = await fetch('inflasi_data.csv');
        if (!response.ok) throw new Error('Gagal mengambil CSV: ' + response.status);
        const csvText = await response.text();
        
        PapaParse.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            rawData = results.data.map(row => ({
              tahun: parseInt(row.tahun),
              bulan: parseInt(row.bulan),
              level_wilayah: row.level_wilayah?.trim().toLowerCase(),
              nama_wilayah: row.nama_wilayah?.trim(),
              inflasi_mtm: parseFloat(row.inflasi_mtm),
              inflasi_ytd: parseFloat(row.inflasi_ytd),
              inflasi_yoy: parseFloat(row.inflasi_yoy),
              created_at: row.created_at
            })).filter(r => !isNaN(r.tahun) && !isNaN(r.bulan) && r.nama_wilayah);
            
            // Update timestamp
            const now = new Date();
            updateSpan.textContent = `Data terakhir: ${now.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})} · ${rawData.length} baris`;
            
            renderLatestCards();
            renderInflationChart();
          },
          error: (err) => {
            console.error(err);
            cardsContainer.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Gagal parsing CSV.</div>`;
          }
        });
      } catch (error) {
        console.error(error);
        cardsContainer.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Gagal memuat data: ${error.message}</div>`;
        updateSpan.textContent = 'Gagal memuat CSV';
      }
    }

    // ---------- CARDS: data terakhir (bulan terkini global) ----------
    function renderLatestCards() {
      if (!rawData.length) return;
      
      // Cari bulan & tahun terbaru di seluruh data
      let maxYear = -Infinity, maxMonth = -Infinity;
      rawData.forEach(r => {
        if (r.tahun > maxYear || (r.tahun === maxYear && r.bulan > maxMonth)) {
          maxYear = r.tahun;
          maxMonth = r.bulan;
        }
      });
      
      const latestPeriod = `${maxYear}-${String(maxMonth).padStart(2,'0')}`;
      
      // Filter wilayah yang diinginkan
      const wilayahTarget = [
        { level: 'nasional', nama: 'Nasional', icon: 'fa-globe' },
        { level: 'provinsi', nama: 'Jawa Tengah', icon: 'fa-map' },
        { level: 'kota', nama: 'Kota Tegal', icon: 'fa-city' }
      ];
      
      let cardsHtml = '';
      
      wilayahTarget.forEach(w => {
        // cari record yang sesuai level DAN nama_wilayah (case-insensitive)
        let record = rawData.find(r => 
          r.level_wilayah === w.level && 
          r.nama_wilayah.toLowerCase().includes(w.nama.toLowerCase()) &&
          r.tahun === maxYear && r.bulan === maxMonth
        );
        
        // fallback jika tidak ditemukan (cari terbaru per wilayah)
        if (!record) {
          const wilayahRecords = rawData.filter(r => 
            r.level_wilayah === w.level && r.nama_wilayah.toLowerCase().includes(w.nama.toLowerCase())
          );
          if (wilayahRecords.length) {
            record = wilayahRecords.reduce((a, b) => 
              (a.tahun > b.tahun || (a.tahun === b.tahun && a.bulan > b.bulan)) ? a : b
            );
          }
        }
        
        if (record) {
          const mtm = record.inflasi_mtm;
          const ytd = record.inflasi_ytd;
          const yoy = record.inflasi_yoy;
          const monthNames = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
          const periodeText = `${monthNames[record.bulan-1]} ${record.tahun}`;
          
          const mtmClass = mtm >= 0 ? 'trend-up' : 'trend-down';
          const ytdClass = ytd >= 0 ? 'trend-up' : 'trend-down';
          const yoyClass = yoy >= 0 ? 'trend-up' : 'trend-down';
          
          cardsHtml += `
            <div class="info-card">
              <div class="card-header">
                <span class="wilayah-badge"><i class="fas ${w.icon}"></i> ${w.nama}</span>
                <span class="periode"><i class="far fa-calendar"></i> ${periodeText}</span>
              </div>
              <div class="stats-row">
                <div class="stat-item">
                  <span class="stat-label"><i class="fas fa-arrow-right"></i> MtM (bulanan)</span>
                  <span class="stat-value ${mtmClass}">${mtm.toFixed(2)}% <i class="fas ${mtm >= 0 ? 'fa-arrow-up' : 'fa-arrow-down'} trend-icon"></i></span>
                </div>
                <div class="stat-item">
                  <span class="stat-label"><i class="fas fa-calendar-alt"></i> YtD (tahun kalender)</span>
                  <span class="stat-value ${ytdClass}">${ytd.toFixed(2)}% <i class="fas ${ytd >= 0 ? 'fa-arrow-up' : 'fa-arrow-down'} trend-icon"></i></span>
                </div>
                <div class="stat-item">
                  <span class="stat-label"><i class="fas fa-chart-line"></i> YoY (tahun ke tahun)</span>
                  <span class="stat-value ${yoyClass}">${yoy.toFixed(2)}% <i class="fas ${yoy >= 0 ? 'fa-arrow-up' : 'fa-arrow-down'} trend-icon"></i></span>
                </div>
              </div>
            </div>
          `;
        } else {
          cardsHtml += `<div class="info-card"><div class="loading-placeholder">Data ${w.nama} tidak tersedia</div></div>`;
        }
      });
      
      cardsContainer.innerHTML = cardsHtml;
    }

    // ---------- SIAPKAN DATA UNTUK CHART INFLASI (dengan filter) ----------
    function prepareChartData() {
      const metric = metricSelect.value; // 'inflasi_mtm', 'inflasi_ytd', 'inflasi_yoy'
      const yearFilter = yearSelect.value; // 'all', '2024', '2025', '2026'
      
      // Kelompokkan per wilayah: Nasional, Jawa Tengah, Kota Tegal
      const seriesMap = {
        'Nasional': [],
        'Jawa Tengah': [],
        'Kota Tegal': []
      };
      
      // Filter data berdasarkan tahun
      let filtered = rawData.filter(r => {
        if (yearFilter === 'all') return true;
        return r.tahun === parseInt(yearFilter);
      });
      
      // Sorting by date
      filtered.sort((a,b) => (a.tahun - b.tahun) || (a.bulan - b.bulan));
      
      filtered.forEach(row => {
        let wilayahKey = null;
        if (row.level_wilayah === 'nasional' && row.nama_wilayah.toLowerCase().includes('nasional')) {
          wilayahKey = 'Nasional';
        } else if (row.level_wilayah === 'provinsi' && row.nama_wilayah.toLowerCase().includes('jawa tengah')) {
          wilayahKey = 'Jawa Tengah';
        } else if (row.level_wilayah === 'kota' && row.nama_wilayah.toLowerCase().includes('kota tegal')) {
          wilayahKey = 'Kota Tegal';
        }
        if (!wilayahKey) return;
        
        const value = row[metric];
        if (typeof value !== 'number' || isNaN(value)) return;
        
        const label = `${row.tahun}-${String(row.bulan).padStart(2,'0')}`;
        seriesMap[wilayahKey].push({ label, value });
      });
      
      // Labels (gabungan unik dari semua series, urut)
      const allLabelsSet = new Set();
      Object.values(seriesMap).forEach(arr => arr.forEach(p => allLabelsSet.add(p.label)));
      const labels = Array.from(allLabelsSet).sort((a,b) => {
        const [y1, m1] = a.split('-').map(Number);
        const [y2, m2] = b.split('-').map(Number);
        return y1 - y2 || m1 - m2;
      });
      
      // Buat dataset per wilayah, mapping nilai per label
      const datasets = [
        { label: 'Nasional', borderColor: colors.nasional, backgroundColor: colors.nasional + '20', data: [], tension: 0.2, fill: false },
        { label: 'Jawa Tengah', borderColor: colors.jateng, backgroundColor: colors.jateng + '20', data: [], tension: 0.2, fill: false },
        { label: 'Kota Tegal', borderColor: colors.tegal, backgroundColor: colors.tegal + '20', data: [], tension: 0.2, fill: false }
      ];
      
      labels.forEach(lbl => {
        datasets[0].data.push(seriesMap['Nasional'].find(p => p.label === lbl)?.value ?? null);
        datasets[1].data.push(seriesMap['Jawa Tengah'].find(p => p.label === lbl)?.value ?? null);
        datasets[2].data.push(seriesMap['Kota Tegal'].find(p => p.label === lbl)?.value ?? null);
      });
      
      return { labels, datasets };
    }

    function renderInflationChart() {
      const ctx = document.getElementById('inflationChart').getContext('2d');
      const { labels, datasets } = prepareChartData();
      
      const metricLabel = metricSelect.options[metricSelect.selectedIndex].text.split(' ').slice(1).join(' ');
      
      if (inflationChartInstance) {
        inflationChartInstance.destroy();
      }
      
      inflationChartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            tooltip: {
              mode: 'index',
              intersect: false,
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${ctx.raw?.toFixed(2) ?? 'n/a'}%`
              }
            },
            legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 10 } },
            title: {
              display: true,
              text: `📈 ${metricLabel} · ${yearSelect.value === 'all' ? '2024-2026' : yearSelect.value}`,
              font: { weight: '500', size: 13 }
            }
          },
          scales: {
            y: {
              beginAtZero: false,
              grid: { color: '#e9eef4' },
              ticks: { callback: (val) => val + '%' }
            }
          },
          elements: { point: { radius: 2.5, hoverRadius: 6 } }
        }
      });
    }

    // ---------- EXCHANGE RATE: USD/IDR 30 hari (frankfurter) ----------
    async function fetchExchangeRate() {
      const badge = document.getElementById('liveRateBadge');
      const ctx = document.getElementById('exchangeChart').getContext('2d');
      
      try {
        // rentang 30 hari kebelakang sampai hari ini
        const today = new Date();
        const endDate = today.toISOString().split('T')[0];
        const startDate = new Date(today);
        startDate.setDate(today.getDate() - 30);
        const startStr = startDate.toISOString().split('T')[0];
        
        const url = `https://api.frankfurter.app/${startStr}..${endDate}?from=USD&to=IDR`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('API error');
        const data = await resp.json();
        
        const rates = data.rates;
        const dates = Object.keys(rates).sort();
        const idrValues = dates.map(d => rates[d].IDR);
        
        // update badge dengan rate terbaru
        if (dates.length) {
          const latestRate = idrValues[idrValues.length-1];
          badge.innerHTML = `<i class="fas fa-dollar-sign"></i> 1 USD = Rp ${latestRate.toLocaleString('id-ID')}`;
        }
        
        if (exchangeChartInstance) exchangeChartInstance.destroy();
        
        exchangeChartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: dates.map(d => new Date(d).toLocaleDateString('id-ID', {day:'numeric', month:'short'})),
            datasets: [{
              label: 'USD → IDR',
              data: idrValues,
              borderColor: '#16a34a',
              backgroundColor: 'rgba(22,163,74,0.05)',
              fill: true,
              tension: 0.2,
              pointRadius: 2,
              borderWidth: 2.5
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              tooltip: {
                callbacks: {
                  label: (ctx) => `Rp ${ctx.raw.toLocaleString('id-ID')}`
                }
              },
              legend: { display: false }
            },
            scales: {
              y: {
                ticks: { callback: (val) => 'Rp ' + (val/1000).toFixed(0) + 'rb' },
                grid: { color: '#e2e8f0' }
              }
            }
          }
        });
      } catch (err) {
        console.warn('Exchange rate gagal, pakai fallback', err);
        badge.innerHTML = '<i class="fas fa-exclamation-circle"></i> menggunakan data estimasi';
        // fallback data statis
        const fallbackDates = [];
        const fallbackValues = [];
        const base = 16400;
        for (let i=30; i>=0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          fallbackDates.push(d.toLocaleDateString('id-ID', {day:'numeric', month:'short'}));
          fallbackValues.push(base + Math.floor(Math.random()*400 - 100));
        }
        if (exchangeChartInstance) exchangeChartInstance.destroy();
        exchangeChartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: fallbackDates,
            datasets: [{
              label: 'USD/IDR (simulasi)',
              data: fallbackValues,
              borderColor: '#f59e0b',
              fill: false
            }]
          },
          options: { maintainAspectRatio: false, plugins: { tooltip: { callbacks: { label: (c) => `Rp ${c.raw}` } } } }
        });
        badge.innerHTML = `<i class="fas fa-chart-simple"></i> 1 USD ≈ Rp ${fallbackValues[fallbackValues.length-1].toLocaleString()}`;
      }
    }

    // ---------- EVENT LISTENERS ----------
    metricSelect.addEventListener('change', () => {
      if (rawData.length) renderInflationChart();
    });
    yearSelect.addEventListener('change', () => {
      if (rawData.length) renderInflationChart();
    });

    // ---------- INIT ----------
    async function init() {
      await loadCSV();            // setelah selesai, render kartu & chart
      fetchExchangeRate();        // independen
    }

    init();

    // refresh data? tidak perlu realtime, tapi jika resize chart mengikuti
    window.addEventListener('resize', () => {
      if (inflationChartInstance) inflationChartInstance.resize();
      if (exchangeChartInstance) exchangeChartInstance.resize();
    });
    
  })();
</script>
</body>
</html>
