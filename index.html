<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Dashboard Data · Inflasi & Kurs</title>
  <!-- Font & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fc;
      padding: 20px;
      color: #1e293b;
    }

    .dashboard {
      max-width: 1440px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      margin-bottom: 28px;
    }
    .header h1 {
      font-weight: 700;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #0f2b4b, #1e4a6f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }
    .header .badge-date {
      background: white;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      display: inline-block;
      margin-left: 20px;
      vertical-align: middle;
      color: #2563eb;
      border: 1px solid #e2e8f0;
    }
    .header i {
      margin-right: 8px;
      color: #3b82f6;
    }

    /* Cards Row */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    .metric-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 28px;
      padding: 24px 22px;
      box-shadow: 0 15px 35px -10px rgba(0,20,50,0.1);
      transition: transform 0.15s ease, box-shadow 0.2s;
    }
    .metric-card:hover {
      box-shadow: 0 22px 40px -12px rgba(0,35,70,0.18);
      transform: translateY(-3px);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .region-name {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.01em;
    }
    .region-icon {
      width: 44px;
      height: 44px;
      background: #eef2ff;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1e4a6f;
      font-size: 1.5rem;
    }

    .indicator-row {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
    }
    .indicator-item {
      text-align: left;
    }
    .indicator-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #64748b;
      font-weight: 600;
    }
    .indicator-value {
      font-size: 2.1rem;
      font-weight: 700;
      line-height: 1.2;
      color: #0b1e32;
    }
    .indicator-unit {
      font-size: 0.9rem;
      font-weight: 500;
      color: #5e7180;
      margin-left: 2px;
    }
    .trend-icon {
      font-size: 1rem;
      margin-left: 5px;
    }
    .positive { color: #b91c1c; }
    .negative { color: #15803d; }

    /* filter bar */
    .filter-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      background: white;
      padding: 12px 24px;
      border-radius: 48px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
      border: 1px solid #e9eef4;
    }
    .filter-label {
      font-weight: 600;
      color: #334155;
    }
    .filter-select {
      padding: 10px 18px;
      border-radius: 40px;
      border: 1.5px solid #dbe2ea;
      background: white;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #0f2b4b;
      outline: none;
      cursor: pointer;
      transition: 0.15s;
    }
    .filter-select:hover {
      border-color: #3b82f6;
    }

    /* charts grid */
    .charts-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 24px;
      margin-top: 8px;
    }

    .chart-card {
      background: white;
      border-radius: 28px;
      padding: 22px 20px 18px;
      box-shadow: 0 12px 28px -8px rgba(0,20,40,0.06);
      border: 1px solid #edf2f9;
      transition: all 0.1s;
    }

    .chart-title {
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chart-title i {
      color: #2563eb;
      background: #e6edf8;
      padding: 8px;
      border-radius: 14px;
    }

    .chart-container {
      position: relative;
      height: 260px;
      width: 100%;
    }

    .currency-info {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      color: #475569;
      font-weight: 500;
      border-top: 1px dashed #cbd5e1;
      padding-top: 16px;
    }

    .footer-note {
      margin-top: 30px;
      text-align: right;
      font-size: 0.8rem;
      color: #62748c;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .cards-grid { grid-template-columns: 1fr; gap: 18px; }
      .charts-grid { grid-template-columns: 1fr; }
      .filter-section { border-radius: 28px; }
    }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .indicator-value { font-size: 1.7rem; }
      .header h1 { font-size: 1.8rem; }
    }

    .loading-placeholder {
      opacity: 0.7;
    }
    .update-badge {
      background: #dee9fc;
      border-radius: 30px;
      padding: 4px 14px;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
<div class="dashboard">
  <!-- HEADER -->
  <div class="header">
    <h1><i class="fas fa-chart-pie" style="margin-right: 12px; background: none; -webkit-background-clip: unset; background-clip: unset; color: #1e4a6f;"></i>Dashboard Data</h1>
    <span class="badge-date" id="updateTimestamp"><i class="far fa-calendar-alt"></i>Memuat data...</span>
  </div>

  <!-- 3 CARDS: Nasional, Jateng, Kota Tegal -->
  <div class="cards-grid" id="cardsContainer">
    <!-- will be populated by js -->
  </div>

  <!-- FILTER UNTUK INFOGRAFIS INFLASI -->
  <div class="filter-section">
    <span class="filter-label"><i class="fas fa-sliders-h"></i> Filter Infografis</span>
    <select id="regionFilter" class="filter-select">
      <option value="Nasional">🇮🇩 Nasional</option>
      <option value="Jawa Tengah">🌾 Jawa Tengah</option>
      <option value="Kota Tegal">🏙️ Kota Tegal</option>
    </select>
    <select id="indicatorFilter" class="filter-select">
      <option value="inflasi_mtm">📆 MtM (bulanan)</option>
      <option value="inflasi_ytd">📅 YtD (tahun kalender)</option>
      <option value="inflasi_yoy" selected>🔄 YoY (tahunan)</option>
    </select>
    <span style="margin-left: auto; font-size: 0.8rem;" id="dataRangeLabel"></span>
  </div>

  <!-- DUA CHART: Inflasi & Kurs USD/IDR -->
  <div class="charts-grid">
    <!-- Chart Inflasi dengan filter -->
    <div class="chart-card">
      <div class="chart-title">
        <i class="fas fa-chart-line"></i> 
        <span id="chartInflasiTitle">Tren Inflasi YoY · Nasional</span>
      </div>
      <div class="chart-container">
        <canvas id="inflasiChart"></canvas>
      </div>
      <div class="currency-info" style="border: none; padding-top: 6px;">
        <span><i class="far fa-clock"></i> <span id="chartDataInfo">2024 - 2026</span></span>
        <span class="update-badge"><i class="fas fa-database"></i> CSV</span>
      </div>
    </div>

    <!-- Chart Perbandingan Dolar & Rupiah (USD/IDR) -->
    <div class="chart-card">
      <div class="chart-title">
        <i class="fas fa-dollar-sign"></i> 
        Perbandingan Dolar (USD) → Rupiah
      </div>
      <div class="chart-container">
        <canvas id="kursChart"></canvas>
      </div>
      <div class="currency-info">
        <span id="kursCurrentLabel">💵 1 USD = ... IDR</span>
        <span id="kursChangeLabel"><i class="fas fa-arrow-trend-up"></i> 7 hari</span>
      </div>
    </div>
  </div>
  <div class="footer-note">
    <i class="far fa-file-alt"></i> Sumber: inflasi_data.csv · Kurs dari API (Frankfurter) · Update real-time
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- GLOBAL VARIABLES ----------
    let rawData = [];               // parsed CSV
    let chartInflasi = null;
    let chartKurs = null;
    
    const regionMap = {
      'Nasional': 'Nasional',
      'Jawa Tengah': 'Jawa Tengah',
      'Kota Tegal': 'Kota Tegal'
    };

    // ---------- HELPER: parse CSV (manual, robust) ----------
    function parseCSV(csvText) {
      const lines = csvText.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',').map(h => h.trim());
      const result = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line === '') continue;
        const values = line.split(',');
        if (values.length < headers.length) continue;
        const obj = {};
        headers.forEach((h, idx) => {
          let val = values[idx]?.trim() || '';
          // convert to number if needed
          if (h.includes('inflasi') || h === 'tahun' || h === 'bulan') {
            const num = parseFloat(val);
            obj[h] = isNaN(num) ? val : num;
          } else {
            obj[h] = val;
          }
        });
        // pastikan kolom penting
        if (obj.tahun && obj.bulan && obj.level_wilayah) {
          result.push(obj);
        }
      }
      return result;
    }

    // Ambil data terbaru per wilayah (berdasarkan tahun+bulan max)
    function getLatestForRegion(data, namaWilayah) {
      const filtered = data.filter(d => d.nama_wilayah === namaWilayah);
      if (filtered.length === 0) return null;
      // sorting tahun desc, bulan desc
      const sorted = [...filtered].sort((a, b) => {
        if (a.tahun !== b.tahun) return b.tahun - a.tahun;
        return b.bulan - a.bulan;
      });
      return sorted[0];
    }

    // Render 3 kartu
    function renderCards(latestData) {
      const container = document.getElementById('cardsContainer');
      const regions = [
        { name: 'Nasional', icon: '🇮🇩', color: '#0b3b5c' },
        { name: 'Jawa Tengah', icon: '🌾', color: '#2c5e2e' },
        { name: 'Kota Tegal', icon: '🏙️', color: '#1e4a6f' }
      ];
      
      let html = '';
      regions.forEach(r => {
        const record = latestData[r.name];
        if (!record) {
          html += `<div class="metric-card"><div class="card-header"><span class="region-name">${r.name}</span><span class="region-icon">${r.icon}</span></div><p>Data tidak tersedia</p></div>`;
          return;
        }
        const mtm = record.inflasi_mtm?.toFixed(2) ?? '—';
        const ytd = record.inflasi_ytd?.toFixed(2) ?? '—';
        const yoy = record.inflasi_yoy?.toFixed(2) ?? '—';
        const monthNames = ['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
        const periode = `${monthNames[record.bulan] || '?'} ${record.tahun}`;
        
        html += `
          <div class="metric-card">
            <div class="card-header">
              <span class="region-name">${r.name}</span>
              <span class="region-icon">${r.icon}</span>
            </div>
            <div style="font-size:0.9rem; color:#546a7a; margin-bottom:6px;"><i class="far fa-calendar-check"></i> ${periode}</div>
            <div class="indicator-row">
              <div class="indicator-item">
                <div class="indicator-label">MtM %</div>
                <div class="indicator-value ${mtm >=0 ? 'positive' : 'negative'}">${mtm}%</div>
              </div>
              <div class="indicator-item">
                <div class="indicator-label">YtD %</div>
                <div class="indicator-value ${ytd >=0 ? 'positive' : 'negative'}">${ytd}%</div>
              </div>
              <div class="indicator-item">
                <div class="indicator-label">YoY %</div>
                <div class="indicator-value ${yoy >=0 ? 'positive' : 'negative'}">${yoy}%</div>
              </div>
            </div>
            <div style="margin-top:12px; color:#7c8b9a; font-size:0.8rem;"><i class="fas fa-map-marker-alt"></i> ${record.level_wilayah}</div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    // Update timestamp
    function setUpdateTimestamp() {
      const now = new Date();
      const formatted = now.toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
      document.getElementById('updateTimestamp').innerHTML = `<i class="far fa-calendar-alt"></i> Data per ${formatted}`;
    }

    // ---------- CHART INFLASI (dengan filter) ----------
    function prepareChartData(region, indicator) {
      // Filter data berdasarkan nama_wilayah
      const filtered = rawData.filter(d => d.nama_wilayah === region);
      if (filtered.length === 0) return { labels: [], values: [] };
      
      // Ubah ke bentuk tanggal untuk sorting
      const withDate = filtered.map(d => {
        const month = d.bulan;
        const year = d.tahun;
        const dateObj = new Date(year, month-1, 1);
        return { ...d, dateObj, label: `${String(month).padStart(2,'0')}/${year}` };
      });
      withDate.sort((a,b) => a.dateObj - b.dateObj);
      
      const labels = withDate.map(d => {
        const monthNames = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
        return `${monthNames[d.bulan-1]} ${d.tahun}`;
      });
      const values = withDate.map(d => {
        let val = d[indicator];
        return typeof val === 'number' ? val : 0;
      });
      
      return { labels, values, raw: withDate };
    }

    function updateInflasiChart() {
      const region = document.getElementById('regionFilter').value;
      const indicator = document.getElementById('indicatorFilter').value;
      
      const indicatorNames = {
        'inflasi_mtm': 'MtM (bulanan)',
        'inflasi_ytd': 'YtD (tahun berjalan)',
        'inflasi_yoy': 'YoY (tahunan)'
      };
      document.getElementById('chartInflasiTitle').innerHTML = `Tren Inflasi ${indicatorNames[indicator]} · ${region}`;
      
      const { labels, values, raw } = prepareChartData(region, indicator);
      
      if (raw.length > 0) {
        const first = raw[0];
        const last = raw[raw.length-1];
        document.getElementById('chartDataInfo').innerText = `${first.label} – ${last.label}`;
      }
      
      if (chartInflasi) {
        chartInflasi.data.labels = labels;
        chartInflasi.data.datasets[0].data = values;
        chartInflasi.data.datasets[0].label = `${region} · ${indicatorNames[indicator]}`;
        chartInflasi.update();
      } else {
        const ctx = document.getElementById('inflasiChart').getContext('2d');
        chartInflasi = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: `${region} · ${indicatorNames[indicator]}`,
              data: values,
              borderColor: '#1e4a6f',
              backgroundColor: 'rgba(30, 74, 111, 0.03)',
              borderWidth: 3,
              pointBackgroundColor: '#1e3a5f',
              pointBorderColor: 'white',
              pointRadius: 3,
              pointHoverRadius: 6,
              tension: 0.2,
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(2)}%` } },
              legend: { display: false }
            },
            scales: {
              y: { 
                grid: { color: '#e2e8f0' },
                ticks: { callback: (val) => val + '%' }
              }
            }
          }
        });
      }
    }

    // ---------- CHART KURS USD/IDR (Frankfurter API + fallback) ----------
    async function fetchAndRenderKurs() {
      const canvas = document.getElementById('kursChart');
      const ctx = canvas.getContext('2d');
      
      let dates = [], rates = [];
      let currentRate = null;
      
      try {
        // API Frankfurter: time series 30 hari terakhir
        const endDate = new Date();
        const startDate = new Date();
        startDate.setDate(endDate.getDate() - 30);
        
        const startStr = startDate.toISOString().split('T')[0];
        const endStr = endDate.toISOString().split('T')[0];
        
        const response = await fetch(`https://api.frankfurter.app/${startStr}..${endStr}?from=USD&to=IDR`);
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        
        const sortedDates = Object.keys(data.rates).sort();
        dates = sortedDates.map(d => {
          const date = new Date(d);
          return date.toLocaleDateString('id-ID', { day:'numeric', month:'short' });
        });
        rates = sortedDates.map(d => data.rates[d].IDR);
        if (rates.length) currentRate = rates[rates.length-1];
      } catch (e) {
        console.warn('Gagal fetch kurs, pakai data simulasi', e);
        // Data simulasi (realistis)
        const today = new Date();
        const baseRate = 16450;
        dates = [];
        rates = [];
        for (let i = 30; i >= 0; i--) {
          const d = new Date();
          d.setDate(today.getDate() - i);
          dates.push(d.toLocaleDateString('id-ID', { day:'numeric', month:'short' }));
          let variation = (Math.sin(i * 0.5) * 180) + (Math.random() * 120 - 60);
          rates.push(Math.round(baseRate + variation));
        }
        currentRate = rates[rates.length-1];
      }
      
      // Update label info
      if (currentRate) {
        document.getElementById('kursCurrentLabel').innerHTML = `💵 1 USD = Rp ${currentRate.toLocaleString('id-ID')}`;
      }
      if (rates.length >= 7) {
        const recent = rates[rates.length-1];
        const old = rates[rates.length-8] || rates[0];
        const change = recent - old;
        const percent = ((change / old)*100).toFixed(2);
        const icon = change >= 0 ? '↑' : '↓';
        document.getElementById('kursChangeLabel').innerHTML = `${icon} ${Math.abs(change).toLocaleString()} (${percent}%) 7 hari`;
      }
      
      if (chartKurs) {
        chartKurs.data.labels = dates;
        chartKurs.data.datasets[0].data = rates;
        chartKurs.update();
      } else {
        chartKurs = new Chart(ctx, {
          type: 'line',
          data: {
            labels: dates,
            datasets: [{
              label: 'USD → IDR',
              data: rates,
              borderColor: '#b45309',
              backgroundColor: 'rgba(180, 83, 9, 0.02)',
              borderWidth: 3,
              pointRadius: 2,
              pointHoverRadius: 5,
              tension: 0.25,
              fill: true,
              borderDash: []
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              tooltip: { callbacks: { label: (ctx) => `Rp ${ctx.raw.toLocaleString('id-ID')}` } }
            },
            scales: {
              y: { 
                ticks: { callback: (val) => 'Rp ' + (val/1000).toFixed(0) + 'rb' },
                grid: { color: '#e9eef4' }
              }
            }
          }
        });
      }
    }

    // ---------- LOAD CSV & INIT ----------
    async function loadCSVAndInit() {
      try {
        const response = await fetch('inflasi_data.csv');
        if (!response.ok) throw new Error('CSV tidak ditemukan, gunakan fallback');
        const csvText = await response.text();
        rawData = parseCSV(csvText);
      } catch (err) {
        console.warn('Menggunakan data cadangan (embedded)', err);
        // Fallback embedded (sama dengan file)
        const embeddedCSV = `tahun,bulan,level_wilayah,nama_wilayah,inflasi_mtm,inflasi_ytd,inflasi_yoy,created_at
